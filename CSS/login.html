<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<style type="text/css">
		body {background-image:url("river2.jpg");
			background-attachment:fixed;
			background-size:100% 100% }

		.login {display: flex;
			    border: 2px solid black;
		        width: 300px;
		        height: 350px;
		        background-color:rgba(0, 0, 0, 0.4);
		        margin:auto;
		        margin-top:150px;

		        align-items:center;
		        flex-direction:column;
		        border-radius: 30px;
		        box-shadow: 2px 3px 4px 5px whitesmoke;}

		 .login h1 {color:white;
		            text-align:center;
		            text-shadow:2px 2px 3px black;
		            text-decoration:underline;}

		 .box { width:70%;
		        margin:10px;
		        padding:5px 15px; }

		 #sub {background-color:darkturquoise;
		       width: 50%;
		       padding: 5px 15px;
		       color: white;
		       margin-top:20px;
		       border-radius:20px; }

		#sub:hover {background-color:magenta;}
		#sub:active {background-color:orange;}

		 a{color: white;
		   margin-top:20px;}
	</style>
</head>
<body>
	<form class="login">

		<h1> LOGIN FORM</h1>
		<input type="text" name="t1" placeholder="Enter Username" class="box" required pattern="[0-9a-zA-Z]+">
		<input type="password" name="t2" placeholder="Enter password" class="box" required pattern=".{6}">
		<input type="submit" name="t3" id="sub">
		<a href=""> New User</a>
		<a href=""> Forgot Password?</a>
	</form>

</body>
</html>
