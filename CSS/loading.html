<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<style type="text/css">
		.loader {border:5px solid grey;
			     width: 50px;
			     height: 50px;
			     border-radius:50%;
			     margin: auto;
			     margin-top:200px;

			     border-top:5px solid darkblue;

			     animation-name:spin;
			     animation-duration: 1s;
			     animation-iteration-count:infinite ;
			     animation-timing-function:linear;  } 

			     @keyframes spin {

			     	0% {transform: rotate(0deg);}
			     	100% {transform: rotate(360deg);}

								 }
	</style>
</head>
<body>
	<div class="loader">
		
	</div>

</body>
</html>
