<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<style type="text/css">
		body {background-color:white;}

		.header h1{text-shadow:2px 2px 3px grey;
			       text-align: center;
			       margin-top:50px; ;
		     }


		.box {border: 2px solid black;
			width: 50%;
			height: 350px;
			

		    position:absolute;
		    left: 50%;
		    top:50%;

		    box-shadow: 2px 3px 5px 7px grey;

		    transform: translate(-50%,-50%);

		    background-image: url("bike1.webp");
		    background-repeat:no-repeat;
		    background-size:100% 100%;

		    animation-name: car;
		    animation-duration: 12s;
		    animation-iteration-count:infinite;}

		    @keyframes car{

		    	0%{background-image:url("bike1.webp");}
		    	20%{background-image:url("bike1.webp");}

		    	25%{background-image: url("bike3.avif");}
		    	40%{background-image: url("bike3.avif");}

		    	45%{background-image: url("bike2.webp");}
		    	60%{background-image: url("bike2.webp");}

		    	65%{background-image: url("bike5.webp");}
		    	80%{background-image: url("bike5.webp");}

		    	85%{background-image: url("bike4.webp");}
		    	95%{background-image: url("bike4.webp");}
		    }

		</style>
</head>
<body>
	<div class="header"> 
		<h1> SUPER BIKES</h1>
	</div>

	<div class="box">
		
	</div>
</body>
</html>
