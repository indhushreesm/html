<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
</head>
<body>
	<form>
		 My fav color:<input type="color" name="t1"> <br> <br>
		 Date:<input type="date" name="t2" max="2020-01-01"> <br> <br>
		 Time:<input type="time" name="t3"> <br> <br>
		 Enter the numbers between 0 and 10:<input type="number" name="t4" min="0" max="10"> <br> <br>
		 Range:<input type="range" name="t5"> <br> <br>
		 Email:<input type="email" name="t6"> <br> <br>
		 url:<input type="url" name="t7"> <br> <br>
		 Mobile number:<input type="tel" name="t8" pattern="[6-9]{1}[0-9]{9}"> <br> <br>
		 <input type="submit" name="sub">
	</form>
</body>
</html>
